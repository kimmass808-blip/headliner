<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          ink:   { 900:'#0a0a0a', 850:'#101010', 800:'#141414', 700:'#1c1c1c', 600:'#262626', 500:'#3a3a3a' },
          paper: '#fafafa',
          muted: '#8a8a8a',
          dim:   '#5a5a5a',
        },
        fontFamily: {
          sans:    ['"Pretendard Variable"','Pretendard','ui-sans-serif','system-ui','sans-serif'],
          display: ['"Big Shoulders Display"','"Pretendard Variable"','sans-serif'],
          mono:    ['"JetBrains Mono"','ui-monospace','SFMono-Regular','Menlo','monospace'],
        },
      }
    }

<style>
  html, body { background:#0a0a0a; }
  body { font-family:'Pretendard Variable', Pretendard, ui-sans-serif, system-ui, sans-serif; -webkit-font-smoothing:antialiased; }
  .hairline   { box-shadow: inset 0 -1px 0 rgba(255,255,255,0.06); }
  .hairline-t { box-shadow: inset 0  1px 0 rgba(255,255,255,0.06); }
  /* shared component placeholder */
  .ph { position:relative; border:1px dashed rgba(255,255,255,0.12); background:rgba(255,255,255,0.015); border-radius:6px;
        display:flex;align-items:center;justify-content:center;color:rgba(250,250,250,0.45);}
  .ph .sub { position:absolute; bottom:8px; right:10px; font-size:10px; letter-spacing:0.18em; color:rgba(250,250,250,0.25); text-transform:uppercase; }
  .logo-headliner { font-family:'Big Shoulders Display', sans-serif; font-weight:900; letter-spacing:0.005em; line-height:1; }
  /* setlist row hover */
  .song-row { transition: background-color .15s ease; }
  .song-row:hover { background-color: rgba(255,255,255,0.025); }
  .song-row:hover .song-title { color:#fafafa; }
  .song-title { transition: color .2s ease; }
  /* external link arrow nudges on hover */
  .ext { display:inline-flex; align-items:center; gap:6px; transition: color .2s ease; }
  .ext:hover { color:#fafafa; }
  .ext:hover .arr { transform: translate(2px, -2px); }
  .arr { transition: transform .2s ease; }
</style>
