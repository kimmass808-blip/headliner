<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Headliner — 검색 결과</title>

<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
<link rel="apple-touch-icon" sizes="180x180" href="icons/favicon-180-apple.png" />

<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@900&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          ink: {
            900: '#0a0a0a', 850: '#101010', 800: '#141414',
            700: '#1c1c1c', 600: '#262626', 500: '#3a3a3a',
          },
          paper: '#fafafa',
          muted: '#8a8a8a',
          dim:   '#5a5a5a',
        },
        fontFamily: {
          sans: ['"Pretendard Variable"', 'Pretendard', 'ui-sans-serif', 'system-ui', 'sans-serif'],
          display: ['"Big Shoulders Display"', '"Pretendard Variable"', 'sans-serif'],
        },
      }
    }
  }
</script>

<style>
  html, body { background:#0a0a0a; }
  body { font-family:'Pretendard Variable', Pretendard, ui-sans-serif, system-ui, sans-serif; -webkit-font-smoothing:antialiased; }
  .hairline    { box-shadow: inset 0 -1px 0 rgba(255,255,255,0.06); }
  .hairline-t  { box-shadow: inset 0  1px 0 rgba(255,255,255,0.06); }

  /* shared component placeholders — visible dashed boxes so it's obvious they're injected from code */
  .ph { position:relative; border:1px dashed rgba(255,255,255,0.12); background:rgba(255,255,255,0.015); border-radius:6px; display:flex;align-items:center;justify-content:center; color:rgba(250,250,250,0.45); }
  .ph::before{ content:attr(data-label); font-family:'Big Shoulders Display','Pretendard Variable',sans-serif; font-weight:900; font-size:11px; letter-spacing:0.25em; text-transform:uppercase; }
  .ph .sub { position:absolute; bottom:8px; right:10px; font-size:10px; letter-spacing:0.18em; color:rgba(250,250,250,0.25); text-transform:uppercase; }

  /* logo */
  .logo-headliner { font-family:'Big Shoulders Display', sans-serif; font-weight:900; letter-spacing:0.005em; line-height:1; }

  /* artist row hover */
  .artist-row { transition: background-color .15s ease; }
  .artist-row:hover { background-color: rgba(255,255,255,0.03); }
  .artist-row:hover .artist-name { color:#fafafa; }
  .artist-row .artist-name { transition: color .2s ease; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body class="bg-ink-900 text-paper">

<div id="root"></div>

<script type="text/babel" src="search-results-data.js"></script>
<script type="text/babel" src="search-results-app.jsx"></script>

</body>
</html>
