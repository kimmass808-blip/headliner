<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Headliner — LineupSection</title>
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />

<link rel="stylesheet" as="style" crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@900&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          ink:   { 900:'#0a0a0a', 850:'#101010', 800:'#141414', 700:'#1c1c1c', 600:'#262626', 500:'#3a3a3a' },
          paper: '#fafafa',
          muted: '#8a8a8a',
          dim:   '#5a5a5a',
          lime:  '#d4ff4d',
        },
        fontFamily: {
          sans: ['"Pretendard Variable"','Pretendard','ui-sans-serif','system-ui','sans-serif'],
          display: ['"Big Shoulders Display"','"Pretendard Variable"','sans-serif'],
        },
      }
    }
  }
</script>

<style>
  html, body { background:#0a0a0a; }
  body { font-family:'Pretendard Variable', Pretendard, ui-sans-serif, system-ui, sans-serif; -webkit-font-smoothing:antialiased; color:#fafafa; }
  .hairline   { box-shadow: inset 0 -1px 0 rgba(255,255,255,0.06); }
  .hairline-t { box-shadow: inset 0  1px 0 rgba(255,255,255,0.06); }
  .logo-headliner { font-family:'Big Shoulders Display', sans-serif; font-weight:900; letter-spacing:0.005em; line-height:1; }
  /* external link arrow nudges on hover (reused pattern from Show detail) */
  .ext { display:inline-flex; align-items:center; gap:6px; transition: color .2s ease; }
  .ext:hover { color:#fafafa; }
  .ext:hover .arr { transform: translate(2px, -2px); }
  .arr { transition: transform .2s ease; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body class="bg-ink-900 text-paper">
<div id="root"></div>
<script type="text/babel" src="lineup-section.jsx"></script>
</body>
</html>
